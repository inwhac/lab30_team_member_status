<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀원 현황 — 연수원 3.0</title>
<style>
:root {
  --primary: #3D6BE4;
  --primary-light: #EEF2FD;
  --primary-mid: #C4D2F9;
  --text-primary: #1A1D23;
  --text-secondary: #5A6070;
  --text-tertiary: #9BA3B4;
  --border: #E4E7EF;
  --border-light: #F0F2F7;
  --bg-page: #F0F2F8;
  --bg-white: #FFFFFF;
  --bg-header: #F8F9FC;
  --s-plan: #6B7AE8; --s-plan-bg: #EDEFFC;
  --s-learning: #22A77C; --s-learning-bg: #E5F7F2;
  --s-end: #9BA3B4; --s-end-bg: #F0F2F7;
  --s-complete: #3D6BE4; --s-complete-bg: #EEF2FD;
  --s-incomplete: #E8523D; --s-incomplete-bg: #FDEEED;
  --s-pending: #D4860A; --s-pending-bg: #FEF6E7;
  --c-online: #22A77C; --c-offline: #9B59B6;
  --c-hybrid: #E8523D; --c-micro: #D4860A;
  --r-sm: 4px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
  --shadow-panel: 0 8px 40px rgba(0,0,0,0.14);
  --font: 'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg-page);color:var(--text-primary);font-size:14px;line-height:1.5;min-height:100vh;}

/* GNB */
.gnb{height:56px;background:var(--bg-white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border);}
.gnb-logo{font-weight:700;font-size:16px;color:var(--primary);letter-spacing:-0.3px;}
.gnb-bc{font-size:13px;color:var(--text-tertiary);display:flex;align-items:center;gap:6px;}
.gnb-bc span{color:var(--text-secondary);font-weight:500;}
.gnb-bc::before{content:'/';}
.gnb-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.gnb-av{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;}

/* Page */
.pw{max-width:1200px;margin:0 auto;padding:28px 24px 80px;}
.page-title{font-size:20px;font-weight:700;letter-spacing:-0.3px;margin-bottom:20px;}

/* Search Card */
.search-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 24px;margin-bottom:16px;box-shadow:var(--shadow);}
.search-row{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;}
.sf{display:flex;flex-direction:column;gap:5px;}
.sf label{font-size:11px;font-weight:700;color:var(--text-secondary);letter-spacing:0.3px;text-transform:uppercase;}
.fg{display:flex;gap:8px;}
select,input[type=text]{height:36px;border:1px solid var(--border);border-radius:var(--r-sm);padding:0 10px;font-size:13px;color:var(--text-primary);background:var(--bg-white);outline:none;transition:border-color .15s;font-family:var(--font);}
select:focus,input[type=text]:focus{border-color:var(--primary);}
select{min-width:130px;cursor:pointer;}
input[type=text]{width:210px;}
input[type=text]::placeholder{color:var(--text-tertiary);}
.search-acts{display:flex;gap:8px;margin-left:auto;align-items:flex-end;}
.btn{height:36px;padding:0 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:#2d58d0;}
.btn-ghost{background:var(--bg-white);color:var(--text-secondary);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg-header);}

/* ── Dashboard Summary ── */
.dash-section{margin-bottom:16px;}
.dash-context{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.dash-context-label{font-size:13px;font-weight:600;color:var(--text-secondary);}
.dash-context-sub{font-size:12px;color:var(--text-tertiary);}

/* 상단 1행 — 핵심 지표 크게 */
.dash-top{display:grid;grid-template-columns:1fr 1fr 2fr 2fr;gap:12px;margin-bottom:12px;}
/* 하단 2행 — 보조 지표 */
.dash-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}

.dcard{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:box-shadow .15s;}
.dcard:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);}
.dcard-accent{border-left:3px solid var(--primary);}
.dcard-accent2{border-left:3px solid var(--s-learning);}

.dcard-label{font-size:11px;font-weight:700;color:var(--text-tertiary);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;}
.dcard-val{font-size:32px;font-weight:800;color:var(--text-primary);letter-spacing:-1px;line-height:1;}
.dcard-val .unit{font-size:16px;font-weight:500;color:var(--text-secondary);margin-left:3px;letter-spacing:0;}
.dcard-val-sm{font-size:26px;}

/* 분할 지표 카드 (학습 수 / 수료 수) */
.dcard-split{}
.dcard-split .dcard-main{display:flex;align-items:flex-end;gap:12px;margin-bottom:12px;}
.dcard-split .dcard-main-val{font-size:32px;font-weight:800;color:var(--text-primary);letter-spacing:-1px;line-height:1;}
.dcard-split .dcard-main-val .unit{font-size:16px;font-weight:500;color:var(--text-secondary);margin-left:3px;letter-spacing:0;}
.dcard-divider{height:1px;background:var(--border-light);margin-bottom:10px;}
.dcard-breakdown{display:flex;gap:0;}
.bd-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;}
.bd-item:not(:last-child){border-right:1px solid var(--border-light);}
.bd-dot{width:6px;height:6px;border-radius:50%;margin-bottom:1px;}
.bd-num{font-size:17px;font-weight:700;line-height:1;}
.bd-label{font-size:10px;font-weight:600;color:var(--text-tertiary);letter-spacing:0.2px;}

/* 수료율 게이지 */
.gauge-wrap{margin-top:8px;}
.gauge-bar{height:6px;border-radius:20px;background:var(--border-light);overflow:hidden;margin-bottom:5px;}
.gauge-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--primary),#6B7AE8);transition:width .6s cubic-bezier(.4,0,.2,1);}
.gauge-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-tertiary);}

/* 보조 지표 카드 */
.dcard-sub-val{font-size:24px;font-weight:700;color:var(--text-primary);letter-spacing:-0.5px;line-height:1;margin-bottom:4px;}
.dcard-sub-val .unit{font-size:13px;font-weight:500;color:var(--text-secondary);}
.dcard-sub-desc{font-size:11px;color:var(--text-tertiary);}

/* 애니메이션 */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.dcard{animation:fadeIn .25s ease both;}
.dcard:nth-child(1){animation-delay:.02s;}
.dcard:nth-child(2){animation-delay:.05s;}
.dcard:nth-child(3){animation-delay:.08s;}
.dcard:nth-child(4){animation-delay:.11s;}

/* List Card */
.list-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden;}
.list-toolbar{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border);gap:10px;background:var(--bg-header);}
.list-count{font-size:13px;color:var(--text-secondary);}
.list-count strong{color:var(--text-primary);font-weight:700;}
.sort-sel{height:30px;padding:0 8px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;color:var(--text-secondary);background:var(--bg-white);cursor:pointer;font-family:var(--font);}
.toolbar-right{margin-left:auto;}

/* Table */
table{width:100%;border-collapse:collapse;}
thead th{background:var(--bg-header);padding:9px 14px;font-size:11px;font-weight:700;color:var(--text-tertiary);text-align:left;border-bottom:1px solid var(--border);letter-spacing:0.3px;white-space:nowrap;}
thead th.tc{text-align:center;}
tbody tr{border-bottom:1px solid var(--border-light);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg-header);}
tbody td{padding:12px 14px;font-size:13px;vertical-align:middle;}
tbody td.tc{text-align:center;}

.no-col{width:44px;color:var(--text-tertiary);font-size:12px;text-align:center;}

/* 임직원 통합 셀 */
.emp-cell{display:flex;align-items:center;gap:12px;}
.emp-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.emp-meta{}
.emp-name{font-weight:700;font-size:14px;color:var(--text-primary);line-height:1.2;}
.emp-dept{font-size:11px;color:var(--text-secondary);margin-top:2px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.emp-role{font-size:11px;color:var(--text-tertiary);margin-top:1px;}

/* 학습 수치 */
.stat-num{font-size:14px;font-weight:700;color:var(--text-primary);}
.stat-num.z{color:var(--text-tertiary);font-weight:400;}
.stat-unit{font-size:11px;color:var(--text-tertiary);margin-left:1px;}

/* 뱃지 */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-plan{background:var(--s-plan-bg);color:var(--s-plan);}
.badge-learning{background:var(--s-learning-bg);color:var(--s-learning);}
.badge-end{background:var(--s-end-bg);color:var(--s-end);}
.badge-complete{background:var(--s-complete-bg);color:var(--s-complete);}
.badge-incomplete{background:var(--s-incomplete-bg);color:var(--s-incomplete);}
.badge-pending{background:var(--s-pending-bg);color:var(--s-pending);}
.badge-online{background:#E5F7F2;color:var(--c-online);}
.badge-offline{background:#F3EDF9;color:var(--c-offline);}
.badge-hybrid{background:#FDEEED;color:var(--c-hybrid);}
.badge-micro{background:#FEF6E7;color:var(--c-micro);}

/* 상세 버튼 */
.btn-detail{height:28px;padding:0 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg-white);font-size:12px;font-weight:600;color:var(--primary);cursor:pointer;font-family:var(--font);transition:all .15s;}
.btn-detail:hover{background:var(--primary-light);border-color:var(--primary-mid);}

/* Empty */
.empty-row td{text-align:center;padding:48px;color:var(--text-tertiary);font-size:14px;}

/* ── Side Panel ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,18,30,0.3);z-index:200;backdrop-filter:blur(2px);}
.overlay.open{display:block;}
.side-panel{position:fixed;top:0;right:0;bottom:0;width:600px;background:var(--bg-white);box-shadow:var(--shadow-panel);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden;}
.side-panel.open{transform:translateX(0);}

.ph{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border);background:var(--bg-header);flex-shrink:0;}
.ph-title{font-size:15px;font-weight:700;}
.ph-close{width:32px;height:32px;border:none;background:none;font-size:20px;color:var(--text-tertiary);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);transition:background .1s;}
.ph-close:hover{background:var(--border-light);}

.pb{overflow-y:auto;flex:1;padding:24px;}

/* 임직원 정보 카드 */
.emp-card{display:flex;align-items:center;gap:16px;padding:16px 20px;background:var(--bg-page);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:20px;}
.ec-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;}
.ec-meta{flex:1;}
.ec-name{font-size:17px;font-weight:700;margin-bottom:2px;}
.ec-dept{font-size:12px;color:var(--text-secondary);margin-bottom:2px;}
.ec-role{font-size:12px;color:var(--text-tertiary);}
.ec-stats{display:flex;gap:14px;flex-shrink:0;}
.ec-stat{display:flex;flex-direction:column;align-items:center;gap:2px;}
.ec-sv{font-size:18px;font-weight:700;}
.ec-sl{font-size:10px;color:var(--text-tertiary);font-weight:500;}

/* 패널 필터 */
.pf-label{font-size:12px;font-weight:700;color:var(--text-tertiary);letter-spacing:0.4px;text-transform:uppercase;margin-bottom:10px;}
.filter-row{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.fg2{display:flex;flex-direction:column;gap:5px;}
.fg2 label{font-size:11px;font-weight:700;color:var(--text-secondary);}
.chips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{height:27px;padding:0 10px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;color:var(--text-secondary);background:var(--bg-white);cursor:pointer;transition:all .13s;font-family:var(--font);}
.chip:hover{border-color:var(--primary-mid);color:var(--primary);}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff;}

/* 패널 학습 목록 */
.plh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.plt{font-size:13px;font-weight:700;}
.plc{font-size:12px;color:var(--text-tertiary);}
.pt{width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;}
.pt th{background:var(--bg-header);padding:9px 12px;font-size:11px;font-weight:700;color:var(--text-tertiary);text-align:left;border-bottom:1px solid var(--border);}
.pt td{padding:11px 12px;font-size:12px;vertical-align:middle;border-bottom:1px solid var(--border-light);}
.pt tr:last-child td{border-bottom:none;}
.pt tr:hover td{background:var(--bg-header);}
.cn{font-weight:600;font-size:13px;color:var(--text-primary);}
.cp{font-size:11px;color:var(--text-tertiary);margin-top:2px;}
.panel-empty{text-align:center;padding:32px;color:var(--text-tertiary);font-size:13px;}
</style>
</head>
<body>

<!-- GNB -->
<nav class="gnb">
  <div class="gnb-logo">연수원 3.0</div>
  <div class="gnb-bc">my Canvas <span>팀원 현황</span></div>
  <div class="gnb-right"><div class="gnb-av">홍</div></div>
</nav>

<div class="pw">
  <h1 class="page-title">팀원 현황</h1>

  <!-- 검색 영역 -->
  <div class="search-card">
    <div class="search-row">
      <div class="sf">
        <label>부서</label>
        <div class="fg">
          <select id="dept1" onchange="onDept1Change()">
            <option value="all">전체</option>
            <option value="IT기획팀" selected>IT기획팀</option>
            <option value="인사팀">인사팀</option>
            <option value="마케팅팀">마케팅팀</option>
          </select>
          <select id="dept2" style="display:none;" onchange="applyFilters()">
            <option value="all">전체</option>
            <option value="LMS솔루션팀">LMS솔루션팀</option>
            <option value="CMS솔루션팀">CMS솔루션팀</option>
          </select>
        </div>
      </div>
      <div class="sf">
        <label>학습 연도</label>
        <select id="year" onchange="applyFilters()">
          <option value="2026" selected>2026년</option>
        </select>
      </div>
      <div class="sf">
        <label>검색어</label>
        <input type="text" id="keyword" placeholder="이름, 사번, 이메일 검색"
          onkeydown="if(event.key==='Enter') applyFilters()" />
      </div>
      <div class="search-acts">
        <button class="btn btn-ghost" onclick="resetSearch()">초기화</button>
        <button class="btn btn-primary" onclick="applyFilters()">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.8"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          검색
        </button>
      </div>
    </div>
  </div>

  <!-- 대시보드 요약 -->
  <div class="dash-section">
    <div class="dash-context">
      <div class="dash-context-label" id="dash-title">IT기획팀 전체</div>
      <div class="dash-context-sub" id="dash-sub">2026년 · <span id="dash-member-count">8</span>명 기준</div>
    </div>

    <!-- 상단 행: 총인원 / 신청 / 학습수 / 수료수 -->
    <div class="dash-top" id="dash-top"></div>
    <!-- 하단 행: 평균 학습시간 / 평균 신청수 / 수료율 -->
    <div class="dash-bottom" id="dash-bottom"></div>
  </div>

  <!-- 목록 -->
  <div class="list-card">
    <div class="list-toolbar">
      <div class="list-count">총 <strong id="list-count-num">8</strong>명</div>
      <div class="toolbar-right">
        <select class="sort-sel" id="sort-sel" onchange="applyFilters()">
          <option value="name-asc">이름 오름차순</option>
          <option value="name-desc">이름 내림차순</option>
          <option value="dept-asc">부서명 오름차순</option>
          <option value="dept-desc">부서명 내림차순</option>
        </select>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th class="tc no-col">NO</th>
          <th>임직원</th>
          <th class="tc">신청</th>
          <th class="tc">예정</th>
          <th class="tc">학습중</th>
          <th class="tc">종료</th>
          <th class="tc">수료</th>
          <th class="tc">상세</th>
        </tr>
      </thead>
      <tbody id="member-list"></tbody>
    </table>
  </div>
</div>

<!-- 패널 오버레이 -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>

<!-- 사이드 패널 -->
<div class="side-panel" id="side-panel">
  <div class="ph">
    <div class="ph-title">상세정보 조회</div>
    <button class="ph-close" onclick="closePanel()">×</button>
  </div>
  <div class="pb" id="panel-body"></div>
</div>

<script>

const COLORS = ['#3D6BE4','#22A77C','#E8523D','#D4860A','#9B59B6','#1A9ED4','#E86E3D','#2ECC71'];

    apply:6, plan:1, learning:2, end:3, complete:3,
    courses:[
      {type:'online', name:'UX 기획 입문 과정', start:'2026.01.06', end:'2026.01.31', lstatus:'종료', cstatus:'수료'},
      {type:'online', name:'데이터 기반 서비스 기획', start:'2026.02.10', end:'2026.03.07', lstatus:'종료', cstatus:'수료'},
      {type:'offline', name:'서비스 디자인 씽킹 워크숍', start:'2026.03.14', end:'2026.03.14', lstatus:'종료', cstatus:'수료'},
      {type:'online', name:'Jira & Confluence 활용 실무', start:'2026.04.01', end:'2026.04.30', lstatus:'학습중', cstatus:'처리 전'},
      {type:'micro', name:'AI 활용 업무 자동화 (마이크로)', start:'2026.05.01', end:'2026.05.15', lstatus:'학습중', cstatus:'처리 전'},
      {type:'online', name:'PO/PM 심화 역량 과정', start:'2026.07.01', end:'2026.07.31', lstatus:'예정', cstatus:'처리 전'},
    ]
  },
  {
    id:1, name:'김태준', avatar:'김', color:'#22A77C',

let currentPanelMember = null; // 현재 열린 패널의 member 객체

function getFiltered() {
  const d1 = document.getElementById('dept1').value;
  const d2 = document.getElementById('dept2').value;
  const kw = document.getElementById('keyword').value.trim().toLowerCase();
  const sort = document.getElementById('sort-sel').value;

  let list = ALL_MEMBERS.filter(m => {
    if (d1 !== 'all' && m.deptTop !== d1) return false;
    if (d2 !== 'all' && m.deptSub !== d2) return false;
    if (kw && !m.name.toLowerCase().includes(kw)) return false;
    return true;
  });

  list = [...list].sort((a, b) => {
    const getDept = m => m.deptSub ? `${m.deptTop} > ${m.deptSub}` : m.deptTop;
    if (sort === 'name-asc')  return a.name.localeCompare(b.name, 'ko');
    if (sort === 'name-desc') return b.name.localeCompare(a.name, 'ko');
    if (sort === 'dept-asc')  return getDept(a).localeCompare(getDept(b), 'ko');
    if (sort === 'dept-desc') return getDept(b).localeCompare(getDept(a), 'ko');
    return 0;
  });

  return list;
}

function getContextLabel() {
  const d1 = document.getElementById('dept1').value;
  const d2 = document.getElementById('dept2').value;
  if (d1 === 'all') return '전체 부서';
  if (d2 === 'all' || !d2) return d1;
  return `${d1} > ${d2}`;
}

/* ════════════════════════════════════════
   집계
════════════════════════════════════════ */
function calcStats(list) {
  const total = list.length;
  const totalApply  = list.reduce((s,m) => s + m.apply, 0);
  const totalPlan   = list.reduce((s,m) => s + m.plan, 0);
  const totalLearn  = list.reduce((s,m) => s + m.learning, 0);
  const totalEnd    = list.reduce((s,m) => s + m.end, 0);
  const totalComp   = list.reduce((s,m) => s + m.complete, 0);

  // 수료 수 (처리전 = end - complete, 미수료 추가)
  const totalPending    = list.reduce((s,m) => {
    const c = m.courses.filter(c => c.cstatus === '처리 전').length; return s+c;}, 0);
  const totalIncomplete = list.reduce((s,m) => {
    const c = m.courses.filter(c => c.cstatus === '미수료').length; return s+c;}, 0);

  // 평균 학습시간: 과정 수 × 8h 가중 mock
  const avgHours = total > 0 ? ((totalApply * 7.4) / total).toFixed(1) : 0;
  const avgApply = total > 0 ? (totalApply / total).toFixed(1) : 0;
  const completeRate = totalApply > 0 ? Math.round((totalComp / totalApply) * 100) : 0;

  return { total, totalApply, totalPlan, totalLearn, totalEnd, totalComp,
           totalPending, totalIncomplete, avgHours, avgApply, completeRate };
}

  renderPanelContent(m, panelFilters);

          <button class="chip${allActive('cstatus')}" onclick="togglePanelChip(this,'cstatus','__all__')">전체</button>
          ${mkChip('cstatus','처리 전','처리 전')}
          ${mkChip('cstatus','수료','수료')}
          ${mkChip('cstatus','미수료','미수료')}
        </div>
      </div>
    </div>

    <div class="plh">
      <div class="plt">학습 목록</div>
      <div class="plc">총 ${courses.length}건</div>
    </div>
    <table class="pt">
      <thead>
        <tr><th>과정유형</th><th>과정명 / 학습기간</th><th>학습상태</th><th>수료상태</th></tr>
      </thead>
      <tbody>${courseRows}</tbody>
    </table>
  `;
}

function togglePanelChip(el, group, val) {
  if (val === '__all__') {
    panelFilters[group] = [];
  } else {
    const arr = panelFilters[group];
    const idx = arr.indexOf(val);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(val);
  }
  renderPanelContent(currentPanelMember, panelFilters);
}

/* ════════════════════════════════════════
   뱃지 헬퍼
════════════════════════════════════════ */
function typeBadge(t) {
  const map = {online:'온라인',offline:'오프라인',hybrid:'하이브리드',micro:'마이크로러닝'};
  return `<span class="badge badge-${t}">${map[t]||t}</span>`;
}
function lsBadge(s) {
  const map = {'예정':'badge-plan','학습중':'badge-learning','종료':'badge-end'};
  return `<span class="badge ${map[s]||''}">${s}</span>`;
}
function csBadge(s) {
  const map = {'수료':'badge-complete','미수료':'badge-incomplete','처리 전':'badge-pending'};
  return `<span class="badge ${map[s]||''}">${s}</span>`;
}

/* ════════════════════════════════════════
   초기 렌더
════════════════════════════════════════ */
applyFilters();
</script>
</body>
